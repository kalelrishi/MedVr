<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedVR - Virtual Medical Learning Platform</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- Super Hands -->
<script src="https://cdn.jsdelivr.net/npm/super-hands@3.2.4/dist/super-hands.min.js"></script>

<!-- ✅ Joystick Controls -->
<script src="https://cdn.jsdelivr.net/npm/aframe-joystick-controls@1.0.1/dist/aframe-joystick-controls.min.js"></script>

<style>
body { margin:0; overflow:hidden; background:#0a0e27; }
#main-menu {
    position: fixed;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    background:#0d3d3d;
    padding:30px;
    border-radius:12px;
    text-align:center;
    z-index:1000;
}
.menu-button {
    display:block;
    margin:10px;
    padding:12px;
    background:#0099cc;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="main-menu">
    <h1>🏥 MedVR</h1>
    <button class="menu-button" onclick="startAnatomyMode()">📚 Learn Anatomy</button>
    <button class="menu-button" onclick="startSurgeryMode()">🔬 Practice Surgery</button>
</div>

<a-scene background="color: #0a0e27">

<!-- ✅ CAMERA WITH JOYSTICK -->
<a-camera position="0 1.6 0"
          look-controls
          joystick-controls="mode: dynamic; maxDistance: 60; moveSpeed: 0.1">

    <a-cursor color="#00d4d4"></a-cursor>
</a-camera>

<!-- ============ ANATOMY ============ -->
<a-entity id="anatomy-scene" visible="false">

<a-light type="ambient" intensity="0.7"></a-light>

<a-entity position="0 0 -5">

<a-sphere class="organ" id="brain" radius="0.3" position="0 2 0" color="#ff6b9d"></a-sphere>

<a-sphere class="organ" id="heart" radius="0.25" position="0 1 0" color="#ff3366"
animation="property: scale; to:1.2 1.2 1.2; dir:alternate; loop:true; dur:800">
</a-sphere>

<a-sphere class="organ" id="left-lung" radius="0.25" position="-0.5 1 0" color="#66ccff"></a-sphere>
<a-sphere class="organ" id="right-lung" radius="0.25" position="0.5 1 0" color="#66ccff"></a-sphere>

<a-box class="organ" id="liver" position="0.4 0.5 0" depth="0.3" height="0.3" width="0.5" color="#cc6633"></a-box>

</a-entity>

<a-text value="Click organs" position="0 3 -5" align="center" color="#00ff99"></a-text>

</a-entity>

<!-- ============ SURGERY ============ -->
<a-entity id="surgery-scene" visible="false">

<a-light type="ambient" intensity="0.7"></a-light>

<a-plane rotation="-90 0 0" width="10" height="10" color="#2a3a4a"></a-plane>

<a-box position="0 1 -5" width="1.5" height="0.2" depth="2" color="#1a5a6a"></a-box>

<a-box id="incision" position="0 1.2 -5" width="0.4" height="0.05" depth="1"
color="#ff3333"></a-box>

</a-entity>

<a-sky color="#0a0e27"></a-sky>

</a-scene>

<script>
const state = { mode:"menu" };

function startAnatomyMode(){
    document.getElementById("main-menu").style.display="none";
    document.getElementById("anatomy-scene").setAttribute("visible","true");
    document.getElementById("surgery-scene").setAttribute("visible","false");
    state.mode="anatomy";
}

function startSurgeryMode(){
    document.getElementById("main-menu").style.display="none";
    document.getElementById("anatomy-scene").setAttribute("visible","false");
    document.getElementById("surgery-scene").setAttribute("visible","true");
    state.mode="surgery";
}

// Organ click
document.querySelectorAll(".organ").forEach(el=>{
    el.addEventListener("click",()=>{
        alert("You clicked: "+el.id);
    });
});
</script>

</body>
</html>
